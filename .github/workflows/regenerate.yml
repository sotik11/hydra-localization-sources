name: regenerate

# Rebuilds every source's data/*.json on a schedule and commits the changes.
#
# NOTE on Cloudflare: a few sources (tribogamer, turkce-yama, calypsoceviri) sit
# behind Cloudflare, which is stricter with datacenter IPs than residential ones,
# so GitHub's runners may get 403 on them. regen_all.sh snapshots each base to
# *.json.backup first and RESTORES it if a fresh run comes back < 50% — so a
# blocked/throttled fetch can never clobber the committed (good) data; those
# sources simply keep their last local seed until refreshed from a residential IP.

on:
  schedule:
    - cron: "0 3 * * *" # daily, 03:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: "Single generator name (e.g. komunitni-preklady) — runs ONLY it, NO commit (block test). Empty = full regen + commit."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: regenerate
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci || npm install

      - name: Regenerate (single source = no-commit block test; empty = full regen with guard)
        # Sources whose sites block GitHub's datacenter IPs are skipped here and
        # refreshed locally from a residential IP instead (see refresh_local.sh).
        # Only affects the full regen_all.sh path; the single-source test ignores it.
        env:
          SKIP_SOURCES: "komunitni-preklady magyaritasok tribogamer"
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            echo "=== single-source TEST: ${{ github.event.inputs.source }} (no commit) ==="
            node "generators/${{ github.event.inputs.source }}.mjs"
          else
            bash regen_all.sh
          fi

      - name: Commit refreshed data
        id: commit
        if: ${{ github.event.inputs.source == '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Exclude gitignored side-outputs so `git add` doesn't fail with
          # "paths are ignored by one of your .gitignore files" (candidates.json
          # per source + steam-applist.json cache).
          git add -- 'data/*.json' ':(exclude)data/*.candidates.json' ':(exclude)data/steam-applist.json'
          if git diff --staged --quiet; then
            echo "No data changes."
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            SUMMARY=$(git diff --staged --stat data/ | tail -1)
            git commit -m "data: scheduled regeneration [skip ci]"
            git push
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"
          fi

      - name: Telegram — OK notification
        if: success() && github.event.inputs.source == ''
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANGES: ${{ steps.commit.outputs.changes }}
          SUMMARY: ${{ steps.commit.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "${CHANGES}" = "true" ]; then
            TEXT=$'✅ *regenerate OK — data updated*\n\n'"${SUMMARY}"$'\n\nCommit pushed to `main`. [run]('"${RUN_URL}"$')'
          else
            TEXT=$'✅ *regenerate OK — no data changes*\n\nAll sources returned identical output. [run]('"${RUN_URL}"$')'
          fi
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "text=${TEXT}"

      - name: Telegram — FAIL notification
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TEXT=$'⚠️ *regenerate workflow FAILED*\n\nRepo: `hydra-localization-sources`\n[run logs]('"${RUN_URL}"$')'
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "text=${TEXT}"
